backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "pages"
    label: "Pages"
    label_singular: "Page"
    description: "Edit page content, images, titles, and descriptions. Header, footer, and calculator are protected."
    files:
      - name: "homepage"
        label: "Homepage"
        file: "index.html"
        description: "Edit main homepage content, hero section, and about sections"
        fields:
          - label: "Hero Section"
            name: "hero_section"
            widget: "object"
            fields:
              - label: "Hero Title"
                name: "title"
                widget: "string"
                default: "Пар, возвращающий силы"
              - label: "Hero Description"
                name: "description"
                widget: "markdown"
                default: "Авторские банные ритуалы для глубокого восстановления тела и легкости в голове.\nТепло, ароматные пары, контраст и забота — все, чтобы вы вышли обновленными."

          - label: "About Section"
            name: "about_section"
            widget: "object"
            fields:
              - label: "Section Title"
                name: "title"
                widget: "string"
                default: "О банях и других пространствах"
              - label: "About Items"
                name: "items"
                widget: "list"
                summary: "{{fields.number}} - {{fields.item_title}}"
                fields:
                  - label: "Number"
                    name: "number"
                    widget: "string"
                    hint: "e.g., 01, 02, 03"
                  - label: "Title"
                    name: "item_title"
                    widget: "string"
                  - label: "Image"
                    name: "image"
                    widget: "image"
                  - label: "Description"
                    name: "description"
                    widget: "markdown"

          - label: "Dortmund Section"
            name: "dortmund_section"
            widget: "object"
            fields:
              - label: "Badge Text"
                name: "badge"
                widget: "string"
                default: "Наша локация"
              - label: "Section Title"
                name: "title"
                widget: "string"
                default: "Мы в Дортмунде"
              - label: "Section Description"
                name: "description"
                widget: "string"
                default: "Приватное спа-заведение с собственной баней, бассейном и джакузи в сердце Германии"
              - label: "Gallery Images"
                name: "gallery_images"
                widget: "list"
                fields:
                  - label: "Image"
                    name: "image"
                    widget: "image"
                  - label: "Alt Text"
                    name: "alt"
                    widget: "string"

          - label: "Business Info"
            name: "business_info"
            widget: "object"
            fields:
              - label: "Business Name"
                name: "name"
                widget: "string"
                default: "VIP-RU Sauna"
              - label: "Business Description"
                name: "description"
                widget: "markdown"
                default: "Премиум пространство для полной релаксации и восстановления в центре Дортмунда.\nПриватная баня, контрастный бассейн, джакузи и зона отдыха."
              - label: "Address"
                name: "address"
                widget: "markdown"
                default: "Westricherstr 62\n44388 Dortmund\nLütgendortmund"
              - label: "Phone"
                name: "phone"
                widget: "string"
                default: "+49 (0) 170 809 8695"
              - label: "Email"
                name: "email"
                widget: "string"
                default: "viprusauna@gmail.com"
              - label: "Hours"
                name: "hours"
                widget: "markdown"
                default: "Пн–Пт: 10:00–23:00\nСб–Вс: 09:00–23:00"

          - label: "Activities Section"
            name: "activities_section"
            widget: "object"
            fields:
              - label: "Section Title"
                name: "title"
                widget: "string"
                default: "ЧТО ДЕЛАТЬ ЕЩЕ?"
              - label: "Section Note"
                name: "note"
                widget: "string"
                default: "Здесь все о новом старте – после сеанса"
              - label: "Activities"
                name: "activities"
                widget: "list"
                fields:
                  - label: "Activity Description"
                    name: "description"
                    widget: "string"

      - name: "hammam"
        label: "Хамам"
        file: "hammam.html"
        description: "Edit Хамам (Turkish Bath) page content"
        fields:
          - label: "Hero Title"
            name: "hero_title"
            widget: "string"
            default: "Баня — это не просто жар"
            hint: "Main page heading displayed in hero section"
          
          - label: "Hero Description"
            name: "hero_lead"
            widget: "text"
            default: "это искусство оздоровления"
            hint: "Subheading text in hero section"
          
          - label: "Feature Section"
            name: "feature_section"
            widget: "object"
            fields:
              - label: "Label"
                name: "label"
                widget: "string"
                default: "Про баню"
              - label: "Title"
                name: "title"
                widget: "string"
                default: "Хамам"
              - label: "Description"
                name: "description"
                widget: "markdown"
                hint: "Detailed description of the bath"
          
          - label: "Gallery"
            name: "gallery"
            widget: "object"
            fields:
              - label: "Title"
                name: "title"
                widget: "string"
                default: "Галерея и видео"
              - label: "Subtitle"
                name: "subtitle"
                widget: "string"
                default: "Посмотрите наше пространство со всех сторон"
              - label: "Images"
                name: "images"
                widget: "list"
                fields:
                  - label: "Image"
                    name: "image"
                    widget: "image"
                    allow_multiple: false
                  - label: "Alt Text"
                    name: "alt"
                    widget: "string"
              - label: "Video URL"
                name: "video_url"
                widget: "string"
                hint: "Path to video file (e.g., images/video.mp4)"

      - name: "banua1"
        label: "Баня на дровах"
        file: "banua1.html"
        description: "Edit Wood Stove Sauna page content"
        fields:
          - label: "Hero Title"
            name: "hero_title"
            widget: "string"
            default: "Баня — это не просто жар"
          
          - label: "Hero Description"
            name: "hero_lead"
            widget: "text"
            default: "это искусство оздоровления"
          
          - label: "Feature Section"
            name: "feature_section"
            widget: "object"
            fields:
              - label: "Label"
                name: "label"
                widget: "string"
                default: "Про баню"
              - label: "Title"
                name: "title"
                widget: "string"
                default: "Баня на дровах + Хаммам"
              - label: "Description"
                name: "description"
                widget: "markdown"
          
          - label: "Gallery"
            name: "gallery"
            widget: "object"
            fields:
              - label: "Title"
                name: "title"
                widget: "string"
                default: "Галерея и видео"
              - label: "Subtitle"
                name: "subtitle"
                widget: "string"
                default: "Посмотрите наше пространство со всех сторон"
              - label: "Images"
                name: "images"
                widget: "list"
                fields:
                  - label: "Image"
                    name: "image"
                    widget: "image"
                  - label: "Alt Text"
                    name: "alt"
                    widget: "string"
              - label: "Video URL"
                name: "video_url"
                widget: "string"

      - name: "bathhousevip"
        label: "VIP Баня"
        file: "bathhousevip.html"
        description: "Edit VIP Bath page content"
        fields:
          - label: "Hero Title"
            name: "hero_title"
            widget: "string"
            default: "Баня — это не просто жар"
          
          - label: "Hero Description"
            name: "hero_lead"
            widget: "text"
          
          - label: "Feature Section"
            name: "feature_section"
            widget: "object"
            fields:
              - label: "Label"
                name: "label"
                widget: "string"
                default: "Про баню"
              - label: "Title"
                name: "title"
                widget: "string"
                default: "Vip Баня"
              - label: "Description"
                name: "description"
                widget: "markdown"
          
          - label: "Gallery"
            name: "gallery"
            widget: "object"
            fields:
              - label: "Title"
                name: "title"
                widget: "string"
                default: "Галерея и видео"
              - label: "Subtitle"
                name: "subtitle"
                widget: "string"
              - label: "Images"
                name: "images"
                widget: "list"
                fields:
                  - label: "Image"
                    name: "image"
                    widget: "image"
                  - label: "Alt Text"
                    name: "alt"
                    widget: "string"
              - label: "Video URL"
                name: "video_url"
                widget: "string"

      - name: "luxbanua"
        label: "Lux Баня"
        file: "luxbanua.html"
        description: "Edit Luxury Bath page content"
        fields:
          - label: "Hero Title"
            name: "hero_title"
            widget: "string"
            default: "Баня — это не просто жар"
          
          - label: "Hero Description"
            name: "hero_lead"
            widget: "text"
          
          - label: "Feature Section"
            name: "feature_section"
            widget: "object"
            fields:
              - label: "Label"
                name: "label"
                widget: "string"
              - label: "Title"
                name: "title"
                widget: "string"
                default: "Lux Баня"
              - label: "Description"
                name: "description"
                widget: "markdown"
          
          - label: "Gallery"
            name: "gallery"
            widget: "object"
            fields:
              - label: "Title"
                name: "title"
                widget: "string"
              - label: "Subtitle"
                name: "subtitle"
                widget: "string"
              - label: "Images"
                name: "images"
                widget: "list"
                fields:
                  - label: "Image"
                    name: "image"
                    widget: "image"
                  - label: "Alt Text"
                    name: "alt"
                    widget: "string"
              - label: "Video URL"
                name: "video_url"
                widget: "string"

      - name: "fishbanua"
        label: "Рыбацкая Баня"
        file: "fishbanua.html"
        description: "Edit Fisher's Bath page content"
        fields:
          - label: "Hero Title"
            name: "hero_title"
            widget: "string"
            default: "Баня — это не просто жар"
          
          - label: "Hero Description"
            name: "hero_lead"
            widget: "text"
          
          - label: "Feature Section"
            name: "feature_section"
            widget: "object"
            fields:
              - label: "Label"
                name: "label"
                widget: "string"
              - label: "Title"
                name: "title"
                widget: "string"
                default: "Рыбацкая баня"
              - label: "Description"
                name: "description"
                widget: "markdown"
          
          - label: "Gallery"
            name: "gallery"
            widget: "object"
            fields:
              - label: "Title"
                name: "title"
                widget: "string"
              - label: "Subtitle"
                name: "subtitle"
                widget: "string"
              - label: "Images"
                name: "images"
                widget: "list"
                fields:
                  - label: "Image"
                    name: "image"
                    widget: "image"
                  - label: "Alt Text"
                    name: "alt"
                    widget: "string"
              - label: "Video URL"
                name: "video_url"
                widget: "string"

      - name: "food"
        label: "Меню"
        file: "food.html"
        description: "Manage food menu items, categories, and prices"
        fields:
          - label: "Page Title"
            name: "page_title"
            widget: "string"
            default: "VIP-RU Меню"
          
          - label: "Page Subtitle"
            name: "page_subtitle"
            widget: "string"
            default: "Премиальная кухня"
          
          - label: "Food Categories"
            name: "food_categories"
            widget: "list"
            summary: "{{fields.category_name}}"
            fields:
              - label: "Category Name"
                name: "category_name"
                widget: "string"
                hint: "e.g., Закуски, Основные блюда, Напитки"
              
              - label: "Food Items"
                name: "items"
                widget: "list"
                summary: "{{fields.name}} - {{fields.price}}"
                fields:
                  - label: "Dish Name"
                    name: "name"
                    widget: "string"
                  
                  - label: "Description"
                    name: "description"
                    widget: "text"
                  
                  - label: "Price"
                    name: "price"
                    widget: "string"
                    hint: "e.g., 12.50€"
                  
                  - label: "Image"
                    name: "image"
                    widget: "image"
                    required: false
                    hint: "Optional: dish photo"

      - name: "sauna1"
        label: "Массаж"
        file: "sauna1.html"
        description: "Edit Massage & Spa page content"
        fields:
          - label: "Hero Title"
            name: "hero_title"
            widget: "string"
            default: "Баня — это не просто жар"
          
          - label: "Hero Description"
            name: "hero_lead"
            widget: "text"
          
          - label: "Feature Section"
            name: "feature_section"
            widget: "object"
            fields:
